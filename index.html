<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Sheet - Fighting Fantasy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="adventure-sheet">
        <header class="sheet-header">
            <h1>Adventure Sheet</h1>
            <p class="book-title" id="book-title">Fighting Fantasy</p>
            <p class="char-name" id="char-name"></p>
        </header>

        <section class="stats-section">
            <!-- Skill -->
            <div class="stat-row">
                <span class="stat-label">Skill</span>
                <div class="stat-controls">
                    <button class="stat-btn" id="skill-decrease" aria-label="Decrease Skill">−</button>
                    <div class="stat-values">
                        <span class="stat-current" id="skill-current">0</span>
                        <span class="stat-separator">/</span>
                        <span class="stat-initial" id="skill-initial">0</span>
                    </div>
                    <button class="stat-btn" id="skill-increase" aria-label="Increase Skill">+</button>
                </div>
            </div>

            <!-- Stamina -->
            <div class="stat-row">
                <span class="stat-label">Stamina</span>
                <div class="stat-controls">
                    <button class="stat-btn" id="stamina-decrease" aria-label="Decrease Stamina">−</button>
                    <div class="stat-values">
                        <span class="stat-current" id="stamina-current">0</span>
                        <span class="stat-separator">/</span>
                        <span class="stat-initial" id="stamina-initial">0</span>
                    </div>
                    <button class="stat-btn" id="stamina-increase" aria-label="Increase Stamina">+</button>
                </div>
            </div>

            <!-- Luck -->
            <div class="stat-row">
                <span class="stat-label">Luck</span>
                <div class="stat-controls">
                    <button class="stat-btn" id="luck-decrease" aria-label="Decrease Luck">−</button>
                    <div class="stat-values">
                        <span class="stat-current" id="luck-current">0</span>
                        <span class="stat-separator">/</span>
                        <span class="stat-initial" id="luck-initial">0</span>
                    </div>
                    <button class="stat-btn" id="luck-increase" aria-label="Increase Luck">+</button>
                </div>
            </div>
        </section>

        <section class="mechanics-section tests-section">
            <h2 class="mechanics-title">Tests</h2>
            <div class="test-buttons">
                <button class="mechanic-btn" id="test-luck">Test Luck</button>
            </div>
            <div class="luck-result" id="luck-result" aria-live="polite"></div>
        </section>

        <section class="mechanics-section dice-section" id="dice-section">
            <h2 class="mechanics-title">Dice</h2>
        </section>

        <section class="mechanics-section combat-section">
            <h2 class="mechanics-title">Combat</h2>

            <div class="combat-setup" id="combat-setup">
                <div class="combat-input-row">
                    <label class="combat-label" for="enemy-name">Enemy</label>
                    <input type="text" class="combat-input" id="enemy-name" placeholder="Name">
                </div>
                <div class="combat-input-row">
                    <label class="combat-label" for="enemy-skill">Skill</label>
                    <input type="number" class="combat-input combat-input--stat" id="enemy-skill" min="1" max="20" value="8">
                </div>
                <div class="combat-input-row">
                    <label class="combat-label" for="enemy-stamina">Stamina</label>
                    <input type="number" class="combat-input combat-input--stat" id="enemy-stamina" min="1" max="30" value="8">
                </div>
                <button class="mechanic-btn mechanic-btn--primary" id="start-combat">Start Combat</button>
            </div>

            <div class="combat-active" id="combat-active" hidden>
                <p class="combat-status" id="combat-status"></p>

                <!-- Stamina bars (BATTLE-04) -->
                <div class="stamina-bar-group" id="combat-stamina-bars">
                    <div class="stamina-bar-row">
                        <span class="stamina-bar-label">You</span>
                        <div class="stamina-bar" id="player-stamina-bar" role="progressbar" aria-valuemin="0" aria-valuemax="20" aria-valuenow="20">
                            <div class="stamina-bar__fill stamina-bar__fill--player" id="player-stamina-fill"></div>
                        </div>
                        <span class="stamina-bar-value" id="player-stamina-value"></span>
                    </div>
                    <div class="stamina-bar-row">
                        <span class="stamina-bar-label" id="enemy-stamina-label">Enemy</span>
                        <div class="stamina-bar" id="enemy-stamina-bar" role="progressbar" aria-valuemin="0" aria-valuemax="8" aria-valuenow="8">
                            <div class="stamina-bar__fill stamina-bar__fill--enemy" id="enemy-stamina-fill"></div>
                        </div>
                        <span class="stamina-bar-value" id="enemy-stamina-value"></span>
                    </div>
                </div>

                <!-- Round result card (BATTLE-03) -->
                <div id="combat-round-result"></div>

                <!-- Legacy result for screen readers -->
                <p class="mechanic-result" id="combat-result" aria-live="polite"></p>

                <div class="combat-actions">
                    <button class="mechanic-btn mechanic-btn--primary" id="roll-round">Roll Round</button>
                    <button class="mechanic-btn" id="flee-combat">Flee</button>
                </div>

                <!-- Post-battle summary (BATTLE-06), hidden until combat ends -->
                <div id="combat-summary" hidden></div>
            </div>
        </section>

        <section class="mechanics-section combat-history-section" id="combat-history-section">
            <h2 class="mechanics-title">Battle History</h2>
            <div id="combat-history"></div>
        </section>

        <section class="actions-section">
            <button class="action-btn" id="switch-book">Switch Book</button>
            <button class="action-btn primary" id="new-game">New Adventure</button>
        </section>
    </main>

    <!-- Book Selection Modal -->
    <div class="modal-overlay" id="book-modal">
        <div class="modal">
            <h2 class="modal-title">Select Book</h2>
            <input type="text" class="book-search" id="book-search" placeholder="Type number or title..." autocomplete="off">
            <ul class="book-list" id="book-list"></ul>
            <button class="modal-cancel" id="modal-cancel">Cancel</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
