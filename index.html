<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Sheet - Fighting Fantasy</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="adventure-sheet">
        <section id="dead-state" class="dead-state" hidden>
            <div class="dead-state__banner">YOU ARE DEAD</div>
            <div class="dead-state__stats">
                <div class="dead-state__stat">
                    <span class="dead-state__stat-label">Skill</span>
                    <span class="dead-state__stat-value" id="dead-skill">0 / 0</span>
                </div>
                <div class="dead-state__stat">
                    <span class="dead-state__stat-label">Stamina</span>
                    <span class="dead-state__stat-value" id="dead-stamina">0 / 0</span>
                </div>
                <div class="dead-state__stat">
                    <span class="dead-state__stat-label">Luck</span>
                    <span class="dead-state__stat-value" id="dead-luck">0 / 0</span>
                </div>
            </div>
            <div class="dead-state__actions">
                <button class="mechanic-btn mechanic-btn--primary" id="dead-restart" disabled>Restart</button>
                <button class="mechanic-btn mechanic-btn--danger" id="dead-change-book" disabled>Change Book</button>
            </div>
        </section>
        <header class="sheet-header">
            <h1>Adventure Sheet</h1>
            <p class="book-title" id="book-title">Fighting Fantasy</p>
            <p class="char-name" id="char-name"></p>
        </header>

        <section class="stats-section">
            <!-- Skill -->
            <div class="stat-row">
                <span class="stat-label">Skill</span>
                <div class="stat-controls">
                    <button class="stat-btn" id="skill-decrease" aria-label="Decrease Skill">−</button>
                    <div class="stat-values">
                        <span class="stat-current" id="skill-current">0</span>
                        <span class="stat-separator">/</span>
                        <span class="stat-initial" id="skill-initial">0</span>
                    </div>
                    <button class="stat-btn" id="skill-increase" aria-label="Increase Skill">+</button>
                </div>
            </div>

            <!-- Stamina -->
            <div class="stat-row">
                <span class="stat-label">Stamina</span>
                <div class="stat-controls">
                    <button class="stat-btn" id="stamina-decrease" aria-label="Decrease Stamina">−</button>
                    <div class="stat-values">
                        <span class="stat-current" id="stamina-current">0</span>
                        <span class="stat-separator">/</span>
                        <span class="stat-initial" id="stamina-initial">0</span>
                    </div>
                    <button class="stat-btn" id="stamina-increase" aria-label="Increase Stamina">+</button>
                </div>
            </div>

            <!-- Luck -->
            <div class="stat-row">
                <span class="stat-label">Luck</span>
                <div class="stat-controls">
                    <button class="stat-btn" id="luck-decrease" aria-label="Decrease Luck">−</button>
                    <div class="stat-values">
                        <span class="stat-current" id="luck-current">0</span>
                        <span class="stat-separator">/</span>
                        <span class="stat-initial" id="luck-initial">0</span>
                    </div>
                    <button class="stat-btn" id="luck-increase" aria-label="Increase Luck">+</button>
                </div>
            </div>
        </section>

        <section class="mechanics-section actions-section">
            <h2 class="mechanics-title">Actions</h2>
            <div class="test-buttons">
                <button class="mechanic-btn" id="test-luck">Test Luck</button>
                <button class="mechanic-btn mechanic-btn--primary" id="start-battle-btn">Start Battle</button>
            </div>
            <button class="mechanic-btn mechanic-btn--danger" id="manual-defeat-btn">I'm Dead</button>
            <div class="luck-result" id="luck-result" aria-live="polite"></div>
        </section>

        <section class="mechanics-section dice-section" id="dice-section">
            <h2 class="mechanics-title">Dice</h2>
        </section>

        <section class="mechanics-section book-mechanics-section" id="book-mechanics-section" hidden>
        </section>

        <section class="mechanics-section combat-history-section" id="combat-history-section">
            <h2 class="mechanics-title">Battle History</h2>
            <div id="combat-history"></div>
        </section>

        <section class="actions-section">
            <button class="action-btn" id="switch-book">Switch Book</button>
            <button class="action-btn primary" id="new-game">New Adventure</button>
        </section>
    </main>

    <!-- Book Selection Modal -->
    <div class="modal-overlay" id="book-modal">
        <div class="modal">
            <h2 class="modal-title">Select Book</h2>
            <input type="text" class="book-search" id="book-search" placeholder="Type number or title..." autocomplete="off">
            <ul class="book-list" id="book-list"></ul>
            <button class="modal-cancel" id="modal-cancel">Cancel</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
